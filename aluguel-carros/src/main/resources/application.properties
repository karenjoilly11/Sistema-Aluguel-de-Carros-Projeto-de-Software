# ─────────────────────────────────────────────
# Configuração do Micronaut
# ─────────────────────────────────────────────

micronaut.application.name=aluguel-carros
micronaut.server.port=8082

# ── Segurança JWT ────────────────────────────
micronaut.security.enabled=true
micronaut.security.authentication=bearer

micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_SECRET:DriveEliteSecretKey2024XYZ987654321ABCDEF0123}
micronaut.security.token.jwt.signatures.secret.generator.jws-algorithm=HS256
micronaut.security.token.jwt.generator.access-token.expiration=86400

# Intercept URL Map
micronaut.security.intercept-url-map[0].pattern=/auth/**
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()

micronaut.security.intercept-url-map[1].pattern=/clientes/**
micronaut.security.intercept-url-map[1].access[0]=isAuthenticated()

# ── CORS ─────────────────────────────────────
micronaut.server.cors.enabled=true

micronaut.server.cors.configurations.web.allowed-origins-regex[0]=http://localhost:[0-9]+
micronaut.server.cors.configurations.web.allowed-methods[0]=GET
micronaut.server.cors.configurations.web.allowed-methods[1]=POST
micronaut.server.cors.configurations.web.allowed-methods[2]=PUT
micronaut.server.cors.configurations.web.allowed-methods[3]=DELETE
micronaut.server.cors.configurations.web.allowed-methods[4]=OPTIONS

micronaut.server.cors.configurations.web.allowed-headers[0]=Content-Type
micronaut.server.cors.configurations.web.allowed-headers[1]=Accept
micronaut.server.cors.configurations.web.allowed-headers[2]=Authorization

micronaut.server.cors.configurations.web.exposed-headers[0]=Authorization

# ── Banco de Dados — PostgreSQL ──────────────
datasources.default.url=jdbc:postgresql://localhost:5432/aluguelcarros
datasources.default.driverClassName=org.postgresql.Driver
datasources.default.username=postgres
datasources.default.password=12345
datasources.default.dialect=POSTGRES

# ── JPA / Hibernate ──────────────────────────
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=false
jpa.default.properties.hibernate.format_sql=false
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect