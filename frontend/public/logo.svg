  <line x1="24" y1="30" x2="52" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="38" x2="49" y2="38" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
